  <style>
    /* Reset et base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #9B6DB8 0%, #7C3BAE 100%);
    }

    /* Splash screen Pharrell Phone - Style original */
    #pharrell-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #9B6DB8 0%, #7C3BAE 100%);
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    #pharrell-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Logo P dans cercle blanc */
    .splash-logo {
      width: 160px;
      height: 160px;
      background: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
    }

    .splash-logo-text {
      font-size: 80px;
      font-weight: 700;
      color: #9B6DB8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Titre */
    .splash-title {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .splash-subtitle {
      color: rgba(255, 255, 255, 0.85);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      margin-bottom: 32px;
    }

    /* Barre de progression */
    .splash-progress-wrap {
      width: 180px;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .splash-progress-bar {
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .splash-loading-text {
      color: rgba(255, 255, 255, 0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      margin-top: 10px;
    }

    /* Spinner compact */
    .splash-spinner {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash screen Pharrell Phone -->
  <div id="pharrell-splash">
    <div class="splash-logo">
      <span class="splash-logo-text">P</span>
    </div>
    <div class="splash-title">Pharrell Phone</div>
    <div class="splash-subtitle">Qualité supérieure / Satisfaction garantie</div>
    <div class="splash-spinner"></div>
    <div class="splash-progress-wrap">
      <div class="splash-progress-bar" id="splash-progress"></div>
    </div>
    <div class="splash-loading-text" id="splash-status">Chargement de l'application…</div>
  </div>

  <script>
    var _splashHidden = false;

    function hideSplash() {
      if (_splashHidden) return;
      _splashHidden = true;
      const splash = document.getElementById('pharrell-splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() {
          splash.remove();
          document.body.style.background = '#F8F5FC';
        }, 350);
      }
    }

    // Barre de progression simulée — donne du feedback visuel pendant le chargement JS
    var _progress = 0;
    var _progressInterval = null;

    function startProgress() {
      var bar = document.getElementById('splash-progress');
      var status = document.getElementById('splash-status');
      if (!bar) return;

      // Progression rapide jusqu'à 70%, puis ralentit (attend Flutter)
      _progressInterval = setInterval(function() {
        if (_progress < 30) {
          _progress += 3;
          if (status) status.textContent = 'Initialisation…';
        } else if (_progress < 60) {
          _progress += 1.5;
          if (status) status.textContent = 'Chargement des données…';
        } else if (_progress < 85) {
          _progress += 0.5;
          if (status) status.textContent = 'Presque prêt…';
        }
        // S'arrête à 85% — Flutter complète jusqu'à 100% quand il est prêt
        if (_progress >= 85) clearInterval(_progressInterval);
        bar.style.width = _progress + '%';
      }, 120);
    }

    function completeProgress() {
      clearInterval(_progressInterval);
      var bar = document.getElementById('splash-progress');
      if (bar) bar.style.width = '100%';
      setTimeout(hideSplash, 250);
    }

    // Observer quand Flutter est prêt
    var _flutterObserver = new MutationObserver(function(mutations) {
      if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
        completeProgress();
        fixFlutterViewport();
        _flutterObserver.disconnect();
      }
    });
    _flutterObserver.observe(document.body, { childList: true, subtree: true });

    // Corriger le viewport Flutter (désactive le zoom forcé)
    function fixFlutterViewport() {
      document.querySelectorAll('meta[name="viewport"]').forEach(function(v) {
        var c = v.getAttribute('content') || '';
        if (c.includes('user-scalable=no') || c.includes('maximum-scale=1')) {
          v.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');
        }
      });
    }

    // Observer les changements de viewport
    var _headObserver = new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        if (m.addedNodes) m.addedNodes.forEach(function(n) {
          if (n.nodeName === 'META' && n.getAttribute('name') === 'viewport')
            setTimeout(fixFlutterViewport, 100);
        });
        if (m.type === 'attributes' && m.attributeName === 'content' &&
            m.target.getAttribute('name') === 'viewport') fixFlutterViewport();
      });
    });
    _headObserver.observe(document.head, { childList: true, subtree: true,
        attributes: true, attributeFilter: ['content'] });
    setTimeout(fixFlutterViewport, 500);

    // Timeout de sécurité absolu : 25s (connexions très lentes)
    // Le splash reste visible PENDANT tout le chargement — pas de page blanche
    setTimeout(hideSplash, 25000);

    // Démarrer la barre de progression immédiatement
    startProgress();

    // Service worker (cache le JS pour les prochaines visites → beaucoup plus rapide)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/custom-service-worker.js')
          .then(function(reg) {
            // Forcer la mise à jour du SW si une nouvelle version est disponible
            reg.update();
          })
          .catch(function() {});
      });
    }
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
