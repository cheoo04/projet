  <style>
    /* Reset et base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #9B6DB8 0%, #7C3BAE 100%);
    }

    /* Splash screen Pharrell Phone - Style original */
    #pharrell-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #9B6DB8 0%, #7C3BAE 100%);
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    #pharrell-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Logo P dans cercle blanc */
    .splash-logo {
      width: 160px;
      height: 160px;
      background: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
    }

    .splash-logo-text {
      font-size: 80px;
      font-weight: 700;
      color: #9B6DB8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Titre */
    .splash-title {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .splash-subtitle {
      color: rgba(255, 255, 255, 0.85);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      margin-bottom: 32px;
    }

    /* Pulse subtil sur le logo — seul indicateur de chargement */
    @keyframes logoPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.85; transform: scale(0.97); }
    }
    .splash-logo {
      animation: logoPulse 2s ease-in-out infinite !important;
    }
  </style>
</head>
<body>
  <!-- Splash screen Pharrell Phone -->
  <div id="pharrell-splash">
    <div class="splash-logo">
      <span class="splash-logo-text">P</span>
    </div>
    <div class="splash-title">Pharrell Phone</div>
    <div class="splash-subtitle">Qualité supérieure / Satisfaction garantie</div>
    <!-- Rien d'autre — le logo pulse suffit -->
  </div>

  <script>
    // Le splash se cache via flutter_bootstrap.js au moment exact
    // où Flutter a fini d'initialiser son moteur — pas de timeout arbitraire.
    // Correction viewport Flutter (désactive zoom forcé)
    function fixFlutterViewport() {
      document.querySelectorAll('meta[name="viewport"]').forEach(function(v) {
        var c = v.getAttribute('content') || '';
        if (c.includes('user-scalable=no') || c.includes('maximum-scale=1')) {
          v.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');
        }
      });
    }
    var _ho = new MutationObserver(function(ms) {
      ms.forEach(function(m) {
        if (m.addedNodes) m.addedNodes.forEach(function(n) {
          if (n.nodeName==='META' && n.getAttribute('name')==='viewport') setTimeout(fixFlutterViewport,100);
        });
        if (m.type==='attributes' && m.attributeName==='content' && m.target.getAttribute('name')==='viewport') fixFlutterViewport();
      });
    });
    _ho.observe(document.head, {childList:true, subtree:true, attributes:true, attributeFilter:['content']});
    setTimeout(fixFlutterViewport, 500);
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
