  <style>
    /* Reset et base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #9B6DB8 0%, #7C3BAE 100%);
    }

    /* Splash screen Pharrell Phone - Style original */
    #pharrell-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #9B6DB8 0%, #7C3BAE 100%);
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    #pharrell-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Logo P dans cercle blanc */
    .splash-logo {
      width: 160px;
      height: 160px;
      background: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
    }

    .splash-logo-text {
      font-size: 80px;
      font-weight: 700;
      color: #9B6DB8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Titre */
    .splash-title {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .splash-subtitle {
      color: rgba(255, 255, 255, 0.85);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      margin-bottom: 32px;
    }

    /* Spinner de chargement */
    .splash-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .splash-loading-text {
      color: rgba(255, 255, 255, 0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      margin-top: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash screen Pharrell Phone -->
  <div id="pharrell-splash">
    <div class="splash-logo">
      <span class="splash-logo-text">P</span>
    </div>
    <div class="splash-title">Pharrell Phone</div>
    <div class="splash-subtitle">Qualité supérieure / Satisfaction garantie</div>
    <div class="splash-spinner"></div>
    <div class="splash-loading-text">Chargement...</div>
  </div>

  <script>
    // Masquer le splash rapidement
    function hideSplash() {
      const splash = document.getElementById('pharrell-splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => {
          splash.remove();
          // Fond blanc pour Flutter
          document.body.style.background = '#FFFFFF';
        }, 300);
      }
    }

    // Observer quand Flutter est prêt (dès qu'il commence à render)
    const observer = new MutationObserver(function(mutations) {
      if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
        hideSplash();
        fixFlutterViewport();
        observer.disconnect();
      }
    });
    
    // Corriger le viewport pour accessibilité
    function fixFlutterViewport() {
      const viewports = document.querySelectorAll('meta[name="viewport"]');
      viewports.forEach(function(viewport) {
        const content = viewport.getAttribute('content') || '';
        if (content.includes('user-scalable=no') || content.includes('maximum-scale=1')) {
          viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');
        }
      });
    }
    
    // Observer les changements de viewport
    const headObserver = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        if (mutation.addedNodes) {
          mutation.addedNodes.forEach(function(node) {
            if (node.nodeName === 'META' && node.getAttribute('name') === 'viewport') {
              setTimeout(fixFlutterViewport, 100);
            }
          });
        }
        if (mutation.type === 'attributes' && mutation.attributeName === 'content') {
          if (mutation.target.getAttribute('name') === 'viewport') {
            fixFlutterViewport();
          }
        }
      });
    });
    
    headObserver.observe(document.head, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['content'] 
    });
    
    setTimeout(fixFlutterViewport, 500);
    
    observer.observe(document.body, { childList: true, subtree: true });

    // Timeout court - 2.5 secondes max (best practice 2025)
    // L'utilisateur doit voir l'interface rapidement
    setTimeout(hideSplash, 2500);

    // Service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/custom-service-worker.js').catch(() => {});
      });
    }
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
