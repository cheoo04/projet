<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Pharrell Phone - Boutique en ligne de smartphones et accessoires. Livraison rapide en Côte d'Ivoire.">
  
  <!-- Google Search Console verification -->
  <meta name="google-site-verification" content="Gj5PmqJiyES4YfwtzvewAFJLr4H-0VRi-XQv46ZOA5w" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pharrell Phone">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon - avec cache-bust -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=2">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=2">

  <title>Pharrell Phone - Boutique Smartphones</title>
  <link rel="manifest" href="manifest.json">

  <!-- Theme color -->
  <meta name="theme-color" content="#9B6DB8">

  <!-- Preconnect pour réduire latence DNS/TLS -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
  <link rel="dns-prefetch" href="https://res.cloudinary.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">

  <!-- Preload ressources critiques -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">

  <!-- Firebase SDK - DEFER pour éviter render-blocking -->
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script defer src="firebase-config.js"></script>

  <meta name="google-signin-client_id" content="862175497641-18f06869ji7mk8dtc0ql04osqmuec6vj.apps.googleusercontent.com">

  <style>
    /* Reset et base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FFFFFF;
    }

    /* Splash screen minimaliste - fond blanc avec spinner discret */
    #pharrell-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #FFFFFF;
      z-index: 9999;
      transition: opacity 0.2s ease-out;
    }

    #pharrell-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Logo simple */
    .splash-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #9B6DB8 0%, #7C3BAE 100%);
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 16px;
    }

    .splash-logo-text {
      font-size: 40px;
      font-weight: 700;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Spinner simple */
    .splash-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #E5E7EB;
      border-top-color: #9B6DB8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash screen minimaliste -->
  <div id="pharrell-splash">
    <div class="splash-logo">
      <span class="splash-logo-text">P</span>
    </div>
    <div class="splash-spinner"></div>
  </div>

  <script>
    // Fonction pour masquer le splash
    function hideSplash() {
      const splash = document.getElementById('pharrell-splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 200);
      }
    }

    // Observer quand Flutter est prêt
    const observer = new MutationObserver(function(mutations) {
      if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
        hideSplash();
        fixFlutterViewport();
        observer.disconnect();
      }
    });
    
    // Corriger le viewport modifié par Flutter
    function fixFlutterViewport() {
      const viewports = document.querySelectorAll('meta[name="viewport"]');
      viewports.forEach(function(viewport) {
        const content = viewport.getAttribute('content') || '';
        if (content.includes('user-scalable=no') || content.includes('maximum-scale=1')) {
          viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');
        }
      });
    }
    
    // Observer les changements de viewport
    const headObserver = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        if (mutation.addedNodes) {
          mutation.addedNodes.forEach(function(node) {
            if (node.nodeName === 'META' && node.getAttribute('name') === 'viewport') {
              setTimeout(fixFlutterViewport, 100);
            }
          });
        }
        if (mutation.type === 'attributes' && mutation.attributeName === 'content') {
          if (mutation.target.getAttribute('name') === 'viewport') {
            fixFlutterViewport();
          }
        }
      });
    });
    
    headObserver.observe(document.head, { 
      childList: true, 
      subtree: true, 
      attributes: true, 
      attributeFilter: ['content'] 
    });
    
    setTimeout(fixFlutterViewport, 500);
    setTimeout(fixFlutterViewport, 1000);
    
    observer.observe(document.body, { childList: true, subtree: true });

    // Timeout réduit - masquer après 4 secondes max
    setTimeout(hideSplash, 4000);

    // Enregistrer le service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/custom-service-worker.js')
          .then(reg => console.log('✅ SW enregistré'))
          .catch(err => console.warn('⚠️ SW erreur:', err));
      });
    }
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
